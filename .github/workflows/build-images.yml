name: Build and Push Container Image

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Image to build (directory name under images/)'
        required: true
        default: 'openclaw'
        type: choice
        options:
          - openclaw
      version:
        description: 'Upstream version/branch to build (e.g. main, v2026.1.15)'
        required: false
        default: 'main'
        type: string

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [openclaw]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Determine build args
        id: build-args
        run: |
          VERSION="${{ inputs.version || 'main' }}"
          # Map image name to the correct ARG name
          case "${{ matrix.image }}" in
            openclaw) echo "args=OPENCLAW_VERSION=$VERSION" >> $GITHUB_OUTPUT ;;
            *) echo "args=" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
